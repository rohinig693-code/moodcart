<!DOCTYPE html>
<html lang="en">
<head>
    <title>MoodCart Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family: Arial, sans-serif; background:#f4f6f9;">

    <div style="
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    ">

        <form onsubmit="loginUser(event)" style="
            background:white;
            padding:30px;
            width:320px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        ">

            <h2 style="text-align:center; margin-bottom:5px;">
                MoodCart
            </h2>

            <p style="text-align:center; color:gray; margin-bottom:20px;">
                Login to continue
            </p>

            <!-- Username -->
            <label>Username</label><br>
            <input 
                type="text" 
                id="username" 
                placeholder="Enter username" 
                required
                style="
                    width:100%;
                    padding:10px;
                    margin:8px 0 15px;
                    border-radius:5px;
                    border:1px solid #ccc;
                "
            >

            <!-- Password -->
            <label>Password</label><br>
            <input 
                type="password" 
                id="password" 
                placeholder="Enter password" 
                required
                style="
                    width:100%;
                    padding:10px;
                    margin:8px 0 20px;
                    border-radius:5px;
                    border:1px solid #ccc;
                "
            >

            <!-- Button -->
            <button type="submit" style="
                width:100%;
                padding:10px;
                background:#4CAF50;
                color:white;
                border:none;
                border-radius:5px;
                font-size:16px;
                cursor:pointer;
            ">
                Login
            </button>

            <!-- Demo -->
            <p style="margin-top:15px; font-size:13px; color:gray; text-align:center;">
           Demo: <b>admin / 1234</b>

        </form>

    </div>
    <div id="custom-popup" class="popup">
    <span id="popup-text"></span>
</div>

    <script src="script.js"></script>

</body>
</html>
