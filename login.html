<!DOCTYPE html>
<html lang="en">

<head>

    <title>MoodCart Login</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->
    <header>

        <h1>MoodCart</h1>

        <p>
            Login to continue shopping based on your mood
        </p>

    </header>



    <!-- Login Form -->
    <form onsubmit="loginUser(event)">

        <h2>User Login</h2>

        <!-- Username -->
        <label>Username</label>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
            required
        >

        <!-- Password -->
        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <!-- Login Button -->
        <button type="submit">
            Login
        </button>

        <br><br>

        <p>
            Demo Login:<br>
            Username: <b>admin</b><br>
            Password: <b>1234</b>
        </p>

    </form>



    <!-- Footer -->
    <footer>

        <p>
            © 2026 MoodCart Project
        </p>

    </footer>



    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
